# Optional production variant (paired with the multi-stage nginx Dockerfile in
# BUILD_GUIDE §50). Serves the compiled SPA and reverse-proxies /api -> gateway:8000
# so the browser only ever talks to the frontend origin. Not used by the MVP compose,
# which runs the Vite dev server instead.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://gateway:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
