services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro   # 01_schema.sql + 02_seed.sql auto-run on first boot
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"          # host port only for local psql/debug; set POSTGRES_HOST_PORT if 5432 is taken. Services reach db via the compose network on 5432.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  inference:
    build:
      context: ./inference
      dockerfile: Dockerfile
    environment:
      MODEL_PATH: /app/models/change_unet_resnet34.pt
      TORCH_DEVICE: cpu
    volumes:
      - shared_images:/data/images                  # same volume as gateway (read side)
      - ./inference/models:/app/models:ro           # locally-trained demo checkpoint
    expose:
      - "8001"                                       # internal only — NOT published to host
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/health').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    environment:
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      INFERENCE_URL: ${INFERENCE_URL}               # http://inference:8001
      IMAGE_STORE_DIR: /data/images
      CORS_ORIGINS: ${CORS_ORIGINS}                 # http://localhost:5173
    volumes:
      - shared_images:/data/images                  # same volume as inference (write side)
    ports:
      - "${GATEWAY_HOST_PORT:-8010}:8000"            # host debug port (8000 taken by other stacks); browser uses Vite /api proxy -> internal gateway:8000
    depends_on:
      db:
        condition: service_healthy
      inference:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE: ${VITE_API_BASE}               # /api (dev proxy) or http://localhost:8000
    ports:
      - "5173:5173"                                  # Vite dev server
    depends_on:
      - gateway
    restart: unless-stopped

volumes:
  pgdata:
  shared_images:
